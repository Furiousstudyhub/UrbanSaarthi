<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="ecgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a7f3d0;stop-opacity:0.6"/>
      <stop offset="30%" style="stop-color:#6ee7b7;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#6ee7b7;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#a7f3d0;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- ECG line -->
  <polyline 
    points="0,30 30,30 40,30 50,28 55,30 60,30 65,22 68,8 72,52 76,18 80,32 85,28 90,30 95,30 110,30 200,30" 
    fill="none" 
    stroke="url(#ecgGrad)" 
    stroke-width="2.5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <!-- Faint second line for depth -->
  <polyline 
    points="0,30 30,30 40,30 50,28 55,30 60,30 65,22 68,8 72,52 76,18 80,32 85,28 90,30 95,30 110,30 200,30" 
    fill="none" 
    stroke="#10b981" 
    stroke-width="1" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    opacity="0.3"
  />
</svg>
